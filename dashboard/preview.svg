<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2b4a"/>
      <stop offset="100%" style="stop-color:#243a63"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
  </g>

  <!-- Map dots -->
  <circle cx="580" cy="310" r="10" fill="#2e7d32" opacity=".9"/>
  <circle cx="620" cy="285" r="8"  fill="#e65100" opacity=".9"/>
  <circle cx="650" cy="330" r="12" fill="#2e7d32" opacity=".9"/>
  <circle cx="560" cy="340" r="8"  fill="#b71c1c" opacity=".9"/>
  <circle cx="700" cy="300" r="9"  fill="#2e7d32" opacity=".9"/>
  <circle cx="540" cy="290" r="7"  fill="#e65100" opacity=".8"/>
  <circle cx="680" cy="355" r="8"  fill="#2e7d32" opacity=".8"/>

  <!-- Bacchus pin -->
  <rect x="618" y="248" width="90" height="26" rx="8" fill="#1a2b4a" filter="url(#shadow)"/>
  <text x="663" y="265" font-family="-apple-system,sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="600">🍷 Bacchus</text>

  <!-- Main content -->
  <text x="100" y="220" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="72" fill="#fff" font-weight="700">🏠</text>

  <text x="100" y="310" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="52" fill="#fff" font-weight="700">Vancouver</text>
  <text x="100" y="375" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="52" fill="#fff" font-weight="700">Apartment Tracker</text>

  <text x="100" y="430" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="24" fill="rgba(255,255,255,0.6)" font-weight="400">Live map · Craigslist + Kijiji · Updated every hour</text>

  <!-- Badges -->
  <rect x="100" y="470" width="140" height="38" rx="19" fill="rgba(255,255,255,0.12)"/>
  <text x="170" y="494" font-family="-apple-system,sans-serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="600">Downtown</text>

  <rect x="254" y="470" width="120" height="38" rx="19" fill="rgba(255,255,255,0.12)"/>
  <text x="314" y="494" font-family="-apple-system,sans-serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="600">Yaletown</text>

  <rect x="388" y="470" width="130" height="38" rx="19" fill="rgba(255,255,255,0.12)"/>
  <text x="453" y="494" font-family="-apple-system,sans-serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="600">West End</text>

  <!-- Price legend -->
  <circle cx="102" cy="555" r="8" fill="#2e7d32"/>
  <text x="118" y="560" font-family="-apple-system,sans-serif" font-size="15" fill="rgba(255,255,255,0.7)">≤ $2,500</text>

  <circle cx="212" cy="555" r="8" fill="#e65100"/>
  <text x="228" y="560" font-family="-apple-system,sans-serif" font-size="15" fill="rgba(255,255,255,0.7)">≤ $3,000</text>

  <circle cx="322" cy="555" r="8" fill="#b71c1c"/>
  <text x="338" y="560" font-family="-apple-system,sans-serif" font-size="15" fill="rgba(255,255,255,0.7)">> $3,000</text>
</svg>
