<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Vancouver Apartment Tracker</title>
  <meta name="description" content="Live map of new 1–2BR rentals in Downtown Vancouver — Craigslist + Kijiji, updated hourly.">
  <meta property="og:title"       content="🏠 Vancouver Apartment Tracker">
  <meta property="og:description" content="Live map of 1–2BR rentals in Downtown, Yaletown, West End & Coal Harbour. Updated hourly.">
  <meta property="og:image"       content="https://alex-paragon24.github.io/vancouver-apartment-tracker/preview.png">
  <meta property="og:url"         content="https://alex-paragon24.github.io/vancouver-apartment-tracker/">
  <meta property="og:type"        content="website">
  <meta name="twitter:card"       content="summary_large_image">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-left">
      <span class="logo">🏠</span>
      <h1>Vancouver Apartments</h1>
      <span id="count" class="count"></span>
    </div>

    <!-- Desktop filters (hidden on mobile) -->
    <div class="desktop-filters">
      <div class="filter-group">
        <button class="filter-btn active" data-br="all">All</button>
        <button class="filter-btn" data-br="1">1BR</button>
        <button class="filter-btn" data-br="2">2BR</button>
      </div>
      <div class="filter-group">
        <button class="filter-btn active" data-status="all">All</button>
        <button class="filter-btn" data-status="New">New</button>
        <button class="filter-btn" data-status="Drafted">Drafted</button>
        <button class="filter-btn" data-status="Sent">Sent</button>
      </div>
      <div class="price-filter">
        <span class="price-label">Max <b id="price-val-d">$3,500</b></span>
        <input type="range" id="price-slider-d" min="1500" max="3500" step="100" value="3500">
      </div>
      <button id="refresh-btn-d" class="refresh-btn">↻</button>
    </div>

    <a href="settings.html" class="settings-btn">Settings</a>

    <!-- Mobile filter toggle (hidden on desktop) -->
    <button class="filter-toggle" id="filter-toggle">Filters</button>
  </header>

  <!-- Mobile filter drawer -->
  <div class="mobile-filter-drawer" id="mobile-drawer">
    <div class="mf-row">
      <div class="filter-group">
        <button class="filter-btn active" data-br="all">All</button>
        <button class="filter-btn" data-br="1">1BR</button>
        <button class="filter-btn" data-br="2">2BR</button>
      </div>
      <div class="filter-group">
        <button class="filter-btn active" data-status="all">All</button>
        <button class="filter-btn" data-status="New">New</button>
        <button class="filter-btn" data-status="Drafted">Drafted</button>
        <button class="filter-btn" data-status="Sent">Sent</button>
      </div>
    </div>
    <div class="mf-row">
      <span class="price-label-m">Max <b id="price-val-m">$3,500</b></span>
      <input type="range" id="price-slider-m" min="1500" max="3500" step="100" value="3500">
      <button id="refresh-btn-m" class="refresh-btn">↻ Refresh</button>
    </div>
  </div>

  <!-- Main -->
  <div class="app-content" id="app-content">
    <aside id="sidebar">
      <div id="loading" class="loading-state">
        <canvas id="lottie-canvas" width="160" height="160"></canvas>
        <p>Searching listings…</p>
      </div>
      <div id="listings"></div>
      <div id="empty" class="empty hidden">No listings match your filters.</div>
    </aside>
    <div id="map"></div>
  </div>

  <!-- Mobile tab bar -->
  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="list">
      <span class="tab-icon">≡</span>List
    </button>
    <button class="tab-btn" data-tab="map">
      <span class="tab-icon">🗺</span>Map
    </button>
  </nav>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@lottiefiles/dotlottie-web/dist/dotlottie-web.iife.js"></script>
  <script src="app.js"></script>
</body>
</html>
